<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tech Community - Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <div class="navbar-nav">
                <a class="nav-link" href="./index.html">Beranda</a>
                <a class="nav-link" href="./form.html">Pendaftaran</a>
                <a class="nav-link active" href="./gallery.html">Multimedia</a>
            </div>
        </div>
    </nav>

    <div class="container text-center">
        <h2 class="mb-4">Konten Multimedia</h2>

        <div class="mb-5">
            <h4>Gambar Komunitas</h4>
            <img id="mainImg" src="https://img.freepik.com/vektor-premium/ilustrasi-baphomet-yang-digambar-tangan-kepala-kambing-setan-dalam-vektor-hitam-putih-pentagram-sebagai-simbol-inti-setan_1271121-1051.jpg?w=360" class="img-fluid rounded border mb-2" alt="Tech">
            <br>
            <button class="btn btn-info btn-sm" onclick="changeImage()">Ganti Gambar</button>
        </div>

        <div class="mb-5">
            <h4>Video Pembelajaran</h4>
            <div class="ratio ratio-16x9 mx-auto" style="max-width: 600px;">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
            </div>
        </div>

        <div class="mb-5">
            <h4>Audio Podcast</h4>
            <audio id="myAudio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
            <div class="mt-2">
                <button class="btn btn-success" onclick="playAudio()">Play</button>
                <button class="btn btn-danger" onclick="stopAudio()">Stop</button>
            </div>
        </div>
        
        <a href="./index.html" class="btn btn-link mb-5">Kembali ke Beranda</a>
    </div>

    <script>
        // Interaksi JavaScript sesuai [cite: 32, 34]
        function changeImage() {
            const img = document.getElementById('mainImg');
            img.src = "https://via.placeholder.com/400x200/000/fff?text=Gambar+Baru";
            alert("Gambar berhasil diganti!");
        }

        const audio = document.getElementById('myAudio');
        function playAudio() { audio.play(); }
        function stopAudio() { audio.pause(); audio.currentTime = 0; }
    </script>
</body>
</html>
