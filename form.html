<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tech Community - Form Pendaftaran</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Form Anggota Baru</h2>
                <form id="registrationForm">
                    <div class="mb-3">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" id="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Bidang Minat</label>
                        <select id="interest" class="form-select">
                            <option value="Web Development">Web Development</option>
                            <option value="Mobile Apps">Mobile Apps</option>
                            <option value="Networking">Networking</option>
                            <option value="Data Science">Data Science</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Daftar Sekarang</button>
                </form>
                
                <div id="resultArea" class="mt-4"></div>
                <hr>
                <a href="./index.html" class="btn btn-secondary btn-sm">Kembali ke Utama</a> </div>
        </div>
    </div>

    <script>
        // Simulasi penyimpanan dengan Array sesuai [cite: 4, 25, 35]
        let members = [];

        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const memberData = {
                nama: document.getElementById('name').value,
                email: document.getElementById('email').value,
                minat: document.getElementById('interest').value
            };

            members.push(memberData); // Simpan ke array [cite: 25]
            
            // Menampilkan data dalam alert [cite: 24]
            alert("Berhasil mendaftar: " + memberData.nama);

            // Menampilkan data di bawah form [cite: 24]
            const resultArea = document.getElementById('resultArea');
            resultArea.innerHTML = `
                <div class="alert alert-info">
                    <h5>Data Terinput:</h5>
                    <p>Nama: ${memberData.nama}<br>Email: ${memberData.email}<br>Minat: ${memberData.minat}</p>
                </div>
            `;
            
            this.reset();
        });
    </script>
</body>
</html
